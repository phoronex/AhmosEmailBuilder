<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Builder Pro — AHMOS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================================
           DESIGN SYSTEM
        ============================================================ */
        :root {
            --bg: #0f1117;
            --bg2: #161b27;
            --bg3: #1e2638;
            --panel: #1a2030;
            --panel2: #212840;
            --border: #2a3450;
            --border2: #344060;
            --accent: #4f7cff;
            --accent2: #6b94ff;
            --accent-glow: rgba(79,124,255,0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #e8ecf4;
            --text2: #8fa0c4;
            --text3: #5a6a8a;
            --font: 'Segoe UI', system-ui, sans-serif;
            --radius: 6px;
            --radius2: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ============================================================
           HEADER
        ============================================================ */
        header {
            height: 52px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            color: white;
            letter-spacing: -1px;
        }

        .app-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .app-version {
            font-size: 10px;
            color: var(--text3);
            background: var(--bg3);
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .save-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: var(--success);
            background: rgba(34,197,94,0.1);
            padding: 3px 8px;
            border-radius: 20px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hbtn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border2);
            background: var(--panel);
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .hbtn:hover {
            background: var(--panel2);
            color: var(--text);
            border-color: var(--accent);
        }

        .hbtn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .hbtn.primary:hover {
            background: var(--accent2);
        }

        /* ============================================================
           MAIN LAYOUT
        ============================================================ */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ============================================================
           SIDEBAR
        ============================================================ */
        aside {
            width: 320px;
            min-width: 320px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg2);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 8px;
            background: none;
            border: none;
            color: var(--text3);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .tab-btn i { font-size: 14px; }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: var(--panel);
        }

        .tab-btn:hover:not(.active) {
            color: var(--text2);
        }

        .tab-content { display: none; flex-direction: column; overflow: hidden; flex: 1; }
        .tab-content.active { display: flex; }

        .scroll-area {
            overflow-y: auto;
            flex: 1;
            padding: 12px;
        }

        .scroll-area::-webkit-scrollbar { width: 4px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* ============================================================
           ACCORDION SECTIONS
        ============================================================ */
        .accordion {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            margin-bottom: 8px;
            overflow: hidden;
        }

        .accordion-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .accordion-header:hover { background: var(--panel2); }

        .accordion-header i:first-child {
            color: var(--accent);
            font-size: 12px;
            width: 16px;
            text-align: center;
        }

        .accordion-header span {
            flex: 1;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .accordion-header .chevron {
            color: var(--text3);
            font-size: 10px;
            transition: transform 0.2s;
        }

        .accordion-body {
            display: none;
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .accordion.open .accordion-body { display: block; }
        .accordion.open .chevron { transform: rotate(180deg); }

        /* ============================================================
           FORM CONTROLS
        ============================================================ */
        .ctrl { margin-bottom: 10px; }

        .ctrl label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .ctrl input[type="text"],
        .ctrl input[type="number"],
        .ctrl select,
        .ctrl textarea {
            width: 100%;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 12px;
            font-family: var(--font);
            transition: border-color 0.15s;
            outline: none;
        }

        .ctrl input:focus,
        .ctrl select:focus,
        .ctrl textarea:focus {
            border-color: var(--accent);
        }

        .ctrl textarea { resize: vertical; min-height: 70px; }

        .ctrl select option { background: var(--bg2); }

        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

        /* Range */
        .range-wrap { display: flex; align-items: center; gap: 8px; }
        .range-wrap input[type="range"] { flex: 1; accent-color: var(--accent); }
        .range-val { font-size: 11px; color: var(--accent); font-weight: 700; min-width: 38px; text-align: right; }

        /* Color picker */
        .color-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: 1px solid var(--border2);
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .color-swatch input[type="color"] {
            position: absolute;
            inset: -4px;
            width: calc(100% + 8px);
            height: calc(100% + 8px);
            opacity: 0;
            cursor: pointer;
            border: none;
            padding: 0;
        }

        .color-swatch-preview {
            position: absolute;
            inset: 0;
            border-radius: 4px;
            pointer-events: none;
        }

        .color-row input[type="text"] {
            flex: 1;
            width: auto;
        }

        /* Toggle switch */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            margin-bottom: 8px;
        }

        .toggle-row label:first-child {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
        }

        .toggle {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .toggle input { display: none; }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: var(--text3);
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle input:checked + .toggle-slider { background: var(--accent); border-color: var(--accent); }
        .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: white; }

        /* Inline button group */
        .btn-group { display: flex; gap: 4px; }

        .btn-group button {
            flex: 1;
            padding: 6px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-group button.active,
        .btn-group button:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Preset colors */
        .color-presets { display: flex; gap: 6px; flex-wrap: wrap; }

        .color-preset {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.15s;
        }

        .color-preset:hover { transform: scale(1.2); border-color: white; }

        /* Info/warning boxes */
        .info-box {
            padding: 8px 10px;
            border-radius: var(--radius);
            font-size: 11px;
            display: flex;
            align-items: flex-start;
            gap: 7px;
            margin-top: 8px;
        }

        .info-box.blue { background: rgba(79,124,255,0.1); color: #7da4ff; border: 1px solid rgba(79,124,255,0.2); }
        .info-box.yellow { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .info-box.green { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }

        /* ============================================================
           BLOCK LIST
        ============================================================ */
        .block-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            margin-bottom: 6px;
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .block-card:hover { border-color: var(--border2); }

        .block-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            background: var(--bg3);
            cursor: pointer;
        }

        .block-title {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text);
        }

        .block-title i { color: var(--accent); font-size: 11px; }

        .block-num {
            font-size: 10px;
            color: var(--text3);
            background: var(--bg);
            padding: 1px 5px;
            border-radius: 3px;
        }

        .block-actions { display: flex; gap: 3px; }

        .bact {
            width: 24px;
            height: 24px;
            border: none;
            background: none;
            color: var(--text3);
            cursor: pointer;
            border-radius: 4px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .bact:hover { background: var(--panel2); color: var(--text); }
        .bact.danger:hover { background: rgba(239,68,68,0.15); color: var(--danger); }

        .block-body {
            padding: 10px;
            display: none;
        }

        .block-body.open { display: block; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text3);
        }

        .empty-state i { font-size: 40px; opacity: 0.4; margin-bottom: 12px; display: block; }
        .empty-state h3 { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .empty-state p { font-size: 12px; }

        /* ============================================================
           ADD BLOCK BAR
        ============================================================ */
        .add-bar {
            background: var(--bg2);
            border-top: 1px solid var(--border);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            flex-shrink: 0;
        }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 8px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .add-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .add-btn i { font-size: 10px; }

        /* ============================================================
           TEMPLATE CARDS
        ============================================================ */
        .template-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 12px;
        }

        .tmpl-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius2);
            padding: 12px 10px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .tmpl-card:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .tmpl-card i {
            font-size: 20px;
            color: var(--accent);
            display: block;
            margin-bottom: 6px;
        }

        .tmpl-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            display: block;
        }

        .tmpl-desc {
            font-size: 10px;
            color: var(--text3);
            margin-top: 3px;
            display: block;
        }

        /* ============================================================
           PREVIEW AREA
        ============================================================ */
        .preview-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #1a1f2e;
        }

        .preview-toolbar {
            height: 44px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            flex-shrink: 0;
        }

        .device-btns { display: flex; gap: 4px; }

        .dev-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: none;
            border: 1px solid transparent;
            border-radius: var(--radius);
            color: var(--text3);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .dev-btn.active {
            background: var(--panel2);
            border-color: var(--border2);
            color: var(--text);
        }

        .dev-btn:hover:not(.active) { color: var(--text2); }

        .preview-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .preview-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
        .preview-wrap::-webkit-scrollbar-track { background: transparent; }
        .preview-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        #frame-wrap {
            width: 100%;
            transition: width 0.3s;
        }

        #frame {
            width: 100%;
            border: none;
            display: block;
            min-height: 400px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        .preview-footer {
            height: 32px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            font-size: 11px;
            color: var(--text3);
            flex-shrink: 0;
        }

        .pf-item { display: flex; align-items: center; gap: 5px; }
        .pf-item span { color: var(--text2); }

        /* ============================================================
           TOAST
        ============================================================ */
        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--panel2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 10px 16px;
            border-radius: var(--radius2);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.success { border-left: 3px solid var(--success); }
        #toast.error { border-left: 3px solid var(--danger); }
        #toast.warning { border-left: 3px solid var(--warning); }
        #toast.info { border-left: 3px solid var(--accent); }

        /* ============================================================
           ACTION BUTTON (inside controls)
        ============================================================ */
        .ctrl-btn {
            width: 100%;
            padding: 7px 12px;
            background: var(--bg3);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text2);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .ctrl-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Image upload area */
        .img-drop {
            border: 2px dashed var(--border2);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text3);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .img-drop:hover { border-color: var(--accent); color: var(--accent); }
        .img-drop i { font-size: 20px; display: block; margin-bottom: 6px; }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal {
            background: var(--panel);
            border: 1px solid var(--border2);
            border-radius: var(--radius2);
            width: 100%;
            max-width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 { font-size: 14px; color: var(--text); }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: var(--bg3);
            color: var(--text2);
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover { background: var(--danger); color: white; }

        .modal-body {
            overflow-y: auto;
            padding: 16px;
            flex: 1;
        }

        /* Cell editor grid */
        .cell-editor-row {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px;
            margin-bottom: 8px;
        }

        .cell-editor-row .cell-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .cell-editor-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 60px;
            gap: 6px;
        }

        .cell-editor-grid input,
        .cell-editor-grid select {
            width: 100%;
            padding: 6px 8px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 11px;
            font-family: var(--font);
            outline: none;
        }

        .cell-editor-grid input[type="color"] {
            padding: 2px;
            height: 32px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div class="logo-mark">EB</div>
            <span class="app-name">Email Builder Pro</span>
            <span class="app-version">v4.0</span>
            <div id="save-badge" class="save-badge" style="display:none;">
                <i class="fas fa-check-circle" style="font-size:10px;"></i>
                <span>Saved</span>
            </div>
        </div>
        <div class="header-right">
            <button class="hbtn" id="save-btn" title="Save (Ctrl+S)"><i class="fas fa-save"></i> Save</button>
            <button class="hbtn" id="load-btn" title="Load Template"><i class="fas fa-folder-open"></i> Load</button>
            <button class="hbtn" id="copy-html-btn" title="Copy HTML (Ctrl+C)"><i class="fas fa-code"></i> HTML</button>
            <button class="hbtn primary" id="copy-visual-btn" title="Copy Visual"><i class="fas fa-copy"></i> Copy Email</button>
            <button class="hbtn" id="export-btn" title="Download (Ctrl+E)"><i class="fas fa-download"></i> Export</button>
        </div>
    </header>

    <main>
        <!-- SIDEBAR -->
        <aside>
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="layout">
                    <i class="fas fa-sliders-h"></i> Layout
                </button>
                <button class="tab-btn" data-tab="content">
                    <i class="fas fa-th-large"></i> Blocks
                </button>
                <button class="tab-btn" data-tab="templates">
                    <i class="fas fa-file-alt"></i> Templates
                </button>
                <button class="tab-btn" data-tab="settings">
                    <i class="fas fa-cog"></i> Settings
                </button>
            </div>

            <!-- LAYOUT TAB -->
            <div id="tab-layout" class="tab-content active">
                <div class="scroll-area">

                    <!-- Global -->
                    <div class="accordion open" id="acc-global">
                        <div class="accordion-header" onclick="toggleAccordion('global')">
                            <i class="fas fa-globe"></i>
                            <span>Global</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-global">
                            <!-- populated by JS -->
                        </div>
                    </div>

                    <!-- Header -->
                    <div class="accordion open" id="acc-header">
                        <div class="accordion-header" onclick="toggleAccordion('header')">
                            <i class="fas fa-heading"></i>
                            <span>Header</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-header">
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="accordion" id="acc-footer">
                        <div class="accordion-header" onclick="toggleAccordion('footer')">
                            <i class="fas fa-shoe-prints"></i>
                            <span>Footer</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-footer">
                        </div>
                    </div>

                </div>
            </div>

            <!-- BLOCKS TAB -->
            <div id="tab-content" class="tab-content">
                <div id="block-list" class="scroll-area" style="flex:1;"></div>
                <div class="add-bar" id="add-bar">
                    <button class="add-btn" data-type="text"><i class="fas fa-font"></i> Text</button>
                    <button class="add-btn" data-type="image"><i class="fas fa-image"></i> Image</button>
                    <button class="add-btn" data-type="two-images"><i class="fas fa-images"></i> 2 Images</button>
                    <button class="add-btn" data-type="two-texts"><i class="fas fa-columns"></i> 2 Cols</button>
                    <button class="add-btn" data-type="button"><i class="fas fa-hand-pointer"></i> Button</button>
                    <button class="add-btn" data-type="table"><i class="fas fa-table"></i> Table</button>
                    <button class="add-btn" data-type="divider"><i class="fas fa-minus"></i> Divider</button>
                    <button class="add-btn" data-type="spacer"><i class="fas fa-arrows-alt-v"></i> Spacer</button>
                </div>
            </div>

            <!-- TEMPLATES TAB -->
            <div id="tab-templates" class="tab-content">
                <div class="template-grid" id="template-grid">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- SETTINGS TAB -->
            <div id="tab-settings" class="tab-content">
                <div class="scroll-area">
                    <!-- RTL -->
                    <div class="accordion" id="acc-rtl">
                        <div class="accordion-header" onclick="toggleAccordion('rtl')">
                            <i class="fas fa-language"></i>
                            <span>RTL / Arabic</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-rtl"></div>
                    </div>
                    <!-- Images -->
                    <div class="accordion" id="acc-images">
                        <div class="accordion-header" onclick="toggleAccordion('images')">
                            <i class="fas fa-image"></i>
                            <span>Image Settings</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-images"></div>
                    </div>
                    <!-- Fixes -->
                    <div class="accordion" id="acc-fixes">
                        <div class="accordion-header" onclick="toggleAccordion('fixes')">
                            <i class="fas fa-wrench"></i>
                            <span>Email Client Fixes</span>
                            <i class="fas fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-body" id="acc-body-fixes"></div>
                    </div>
                </div>
            </div>

        </aside>

        <!-- PREVIEW -->
        <div class="preview-container">
            <div class="preview-toolbar">
                <div class="device-btns">
                    <button class="dev-btn active" data-device="desktop"><i class="fas fa-desktop"></i> Desktop</button>
                    <button class="dev-btn" data-device="tablet"><i class="fas fa-tablet-alt"></i> Tablet</button>
                    <button class="dev-btn" data-device="mobile"><i class="fas fa-mobile-alt"></i> Mobile</button>
                </div>
                <div style="flex:1;"></div>
                <button class="hbtn" id="refresh-btn" style="font-size:11px; padding:5px 10px;"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>
            <div class="preview-wrap">
                <div id="frame-wrap">
                    <iframe id="frame" title="Email Preview"></iframe>
                </div>
            </div>
            <div class="preview-footer">
                <div class="pf-item"><i class="fas fa-ruler-horizontal"></i> Width: <span id="info-width">600px</span></div>
                <div class="pf-item"><i class="fas fa-desktop"></i> View: <span id="info-device">Desktop</span></div>
                <div class="pf-item"><i class="fas fa-language"></i> Dir: <span id="info-dir">LTR</span></div>
                <div style="flex:1;"></div>
                <div class="pf-item" style="color: var(--text3);">© <span id="copyright-year"></span> AHMOS</div>
            </div>
        </div>
    </main>

    <!-- TOAST -->
    <div id="toast"><i id="toast-icon" class="fas fa-check-circle"></i><span id="toast-text"></span></div>

    <!-- HIDDEN INPUTS -->
    <input type="file" id="file-input" style="display:none;" accept=".json">

    <!-- SCRIPTS -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/blocks.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/export.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
